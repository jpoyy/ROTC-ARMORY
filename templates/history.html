<!DOCTYPE html>
<html>
<head>
<title>Item History</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
--bg:#071b0d;
--panel:#0d2d14;
--card:#11381b;
--border:#1f6a30;
--lime:#c8f000;
--white:#fff;
--muted:rgba(255,255,255,0.6);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#05140a,#0c2f17);
font-family:'Rajdhani',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
color:white;
}

.container{
width:100%;
max-width:700px;
background:var(--panel);
border:1px solid var(--border);
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.45);
}

.header{
padding:24px;
background:#0a2511;
border-bottom:1px solid var(--border);
}

.header h1{
color:var(--lime);
font-size:28px;
font-family:'Share Tech Mono',monospace;
}

.history-list{
padding:24px;
display:flex;
flex-direction:column;
gap:18px;
}

.record{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:18px;
}

.field{
color:var(--lime);
font-weight:700;
font-size:14px;
text-transform:uppercase;
margin-bottom:12px;
}

.change{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:12px;
}

.old,.new{
flex:1;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:700;
}

.old{
border:1px solid #aa3333;
color:#ff8d8d;
}

.new{
border:1px solid #2cb34a;
color:#8fffaa;
}

.arrow{
font-size:22px;
color:var(--lime);
}

.date{
font-size:13px;
color:var(--muted);
text-align:right;
}

.empty{
padding:40px;
text-align:center;
color:var(--muted);
}

.back{
display:block;
text-align:center;
padding:20px;
color:var(--lime);
text-decoration:none;
font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Item History</h1>
</div>

<div class="history-list">

{% if history %}
    {% for record in history %}
    <div class="record">

        <!-- Field Changed -->
        <div class="field">
            {{ record[0] }} Change
        </div>

        <!-- Old → New -->
        <div class="change">
            <div class="old">{{ record[1] }}</div>
            <div class="arrow">→</div>
            <div class="new">{{ record[2] }}</div>
        </div>

        <!-- Date -->
        <div class="date">
            {{ record[3] }}
        </div>

    </div>
    {% endfor %}
{% else %}
    <div class="empty">No history recorded.</div>
{% endif %}

</div>

<a href="/inventory" class="back">← Back to Inventory</a>

</div>

</body>
</html>
