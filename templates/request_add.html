<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Request Add Item – ArmorSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>

:root{

    --bg-deep:#081708;
    --bg-panel:#0f2d0f;
    --bg-panel-2:#123615;
    --bg-input:#163d16;

    --border:#2a6b2a;
    --border-active:#4db84d;

    --accent:#dfff88;
    --accent-hover:#f2ffbc;

    --text-primary:#e8ffb0;
    --text-muted:rgba(255,255,255,0.65);
    --text-label:#b7de73;

    --selected-text:#081708;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
        radial-gradient(circle at top left, rgba(80,180,80,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(150,255,100,0.08), transparent 35%),
        linear-gradient(135deg,#081708 0%,#103010 45%,#081708 100%);

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    font-family:'Rajdhani',sans-serif;

    padding:40px 24px;

    overflow-x:hidden;
}

/* =========================
   MAIN CONTAINER
========================= */

.container{

    width:100%;
    max-width:1100px;

    background:
        linear-gradient(
            145deg,
            rgba(15,45,15,0.96),
            rgba(10,28,10,0.96)
        );

    border:1.5px solid rgba(90,180,90,0.18);

    border-radius:28px;

    overflow:hidden;

    display:grid;
    grid-template-columns:420px 1fr;

    box-shadow:
        0 0 0 1px rgba(200,230,60,0.04),
        0 20px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.03);
}

/* =========================
   LEFT PANEL
========================= */

.side-panel{

    position:relative;

    padding:48px 42px;

    background:
        linear-gradient(
            180deg,
            rgba(20,60,20,0.95),
            rgba(10,25,10,0.98)
        );

    border-right:1px solid rgba(255,255,255,0.05);

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    overflow:hidden;
}

.side-panel::before{

    content:"";

    position:absolute;

    width:280px;
    height:280px;

    border-radius:50%;

    background:
        radial-gradient(circle,
        rgba(200,230,60,0.15),
        transparent 70%);

    top:-120px;
    right:-120px;
}

.panel-top,
.panel-bottom{
    position:relative;
    z-index:2;
}

.mini-badge{

    display:inline-flex;
    align-items:center;

    padding:10px 16px;

    border-radius:999px;

    background:rgba(200,230,60,0.08);

    border:1px solid rgba(200,230,60,0.16);

    color:var(--accent);

    font-size:0.72rem;
    font-weight:700;
    letter-spacing:.16em;

    text-transform:uppercase;

    margin-bottom:26px;
}

.panel-title{

    font-size:4rem;
    line-height:.9;

    color:var(--text-primary);

    margin-bottom:22px;

    font-weight:700;
}

.panel-desc{

    color:rgba(255,255,255,0.68);

    line-height:1.7;

    font-size:1rem;

    max-width:300px;
}

.info-box{

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    border-radius:20px;

    padding:20px;
}

.info-label{

    color:var(--accent);

    font-size:0.72rem;
    font-weight:700;
    letter-spacing:.16em;

    text-transform:uppercase;

    margin-bottom:10px;
}

.info-text{

    color:rgba(255,255,255,0.72);

    line-height:1.7;

    font-size:0.95rem;
}

/* =========================
   RIGHT PANEL
========================= */

.form-panel{
    padding:42px 46px;
}

.header{

    display:flex;
    align-items:center;
    justify-content:space-between;

    margin-bottom:36px;
}

.header-title{

    color:white;

    font-size:1.7rem;
    font-weight:700;

    letter-spacing:.05em;
}

.back-btn{

    width:44px;
    height:44px;

    border:none;

    border-radius:14px;

    background:rgba(255,255,255,0.04);

    color:var(--text-muted);

    font-size:1.1rem;

    cursor:pointer;

    transition:.2s;
}

.back-btn:hover{

    background:rgba(200,230,60,0.10);

    color:var(--accent);

    transform:translateY(-2px);
}

/* =========================
   FORM
========================= */

.form-group{
    margin-bottom:26px;
}

label{

    display:block;

    font-size:0.75rem;
    font-weight:700;

    letter-spacing:0.18em;

    color:var(--text-label);

    text-transform:uppercase;

    margin-bottom:12px;
}

input,
select{

    width:100%;

    background:rgba(255,255,255,0.03);

    border:1.5px solid rgba(255,255,255,0.08);

    border-radius:18px;

    padding:18px 20px;

    color:var(--text-primary);

    font-family:'Rajdhani',sans-serif;

    font-size:1.05rem;
    font-weight:600;

    outline:none;

    transition:.2s;
}

input::placeholder{
    color:var(--text-muted);
}

input:focus,
select:focus{

    border-color:var(--border-active);

    background:rgba(255,255,255,0.05);

    box-shadow:0 0 0 4px rgba(77,184,77,0.10);
}

select{
    cursor:pointer;
}

select option{
    background:#103010;
    color:white;
}

/* =========================
   BUTTON
========================= */

.submit-btn{

    width:100%;

    margin-top:12px;

    background:var(--accent);

    border:none;

    border-radius:18px;

    padding:18px 24px;

    color:var(--selected-text);

    font-family:'Rajdhani',sans-serif;

    font-size:1rem;
    font-weight:700;

    letter-spacing:.16em;

    text-transform:uppercase;

    cursor:pointer;

    transition:.2s;
}

.submit-btn:hover{

    background:var(--accent-hover);

    transform:translateY(-2px);
}

.submit-btn:active{
    transform:scale(0.98);
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:980px){

    .container{
        grid-template-columns:1fr;
    }

    .side-panel{
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.05);
    }

    .panel-title{
        font-size:3rem;
    }
}

@media(max-width:640px){

    body{
        padding:20px;
    }

    .side-panel,
    .form-panel{
        padding:28px;
    }

    .panel-title{
        font-size:2.5rem;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="side-panel">

        <div class="panel-top">

            <div class="mini-badge">
                ArmorSafe System
            </div>

            <div class="panel-title">
                Request<br>Item
            </div>

            <div class="panel-desc">
                Submit requests for additional ROTC equipment and inventory assets through the ArmorSafe approval workflow.
            </div>

        </div>

        <div class="panel-bottom">

            <div class="info-box">

                <div class="info-label">
                    Approval Process
                </div>

                <div class="info-text">
                    Submitted requests will be reviewed by authorized personnel before being added to the inventory system.
                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="form-panel">

        <div class="header">

            <div class="header-title">
                New Request Details
            </div>

            <button
                class="back-btn"
                type="button"
                onclick="window.location.href='/inventory'">

                ✕

            </button>

        </div>

        <form method="POST">

            <div class="form-group">

                <label>
                    Item Name
                </label>

                <input
                    type="text"
                    name="name"
                    placeholder="e.g. Tactical Radio"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Category
                </label>

                <select name="category">

                    <option>Firearms</option>
                    <option>Swords</option>
                    <option>Uniforms</option>
                    <option>Audio-Visuals</option>

                </select>

            </div>

            <div class="form-group">

                <label>
                    Condition
                </label>

                <select name="condition">

                    <option>Serviceable</option>
                    <option>Damaged</option>
                    <option>Under Repair</option>

                </select>

            </div>

            <button type="submit" class="submit-btn">
                Submit Request
            </button>

        </form>

    </div>

</div>

</body>
</html>
